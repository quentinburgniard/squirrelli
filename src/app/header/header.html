<mat-toolbar class="gap-4">
  <a class="flex items-center gap-4" routerLink="/">
    <img
      class="size-8"
      src="https://files.digitalleman.com/cej08q7029s7el22akbmbdwf.png"
      alt="Squirrelli"
      loading="eager"
      decoding="async"
    />
    <span class="mb-1.5 font-lato font-black text-3xl lowercase">{{ title }}</span>
  </a>
  <span class="flex-1"></span>
  <button
    type="button"
    matIconButton
    aria-label="Toggle menu"
    [routerLink]="[]"
    [fragment]="_menuOpen() ? undefined : 'menu'"
  >
    <mat-icon>{{ _menuOpen() ? 'menu_open' : 'menu' }}</mat-icon>
  </button>
</mat-toolbar>
<squirrelli-menu [open]="_menuOpen()" />
