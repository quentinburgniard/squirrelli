<div class="flex flex-col gap-4">
  <div>
    <h1 class="font-catamaran text-2xl font-black">Settings</h1>
    <p class="text-sm text-[--mat-sys-on-surface-variant]">
      Manage application preferences and account-level options.
    </p>
  </div>

  <mat-card>
    <mat-card-content class="flex flex-col gap-3">
      <div>
        <p class="text-xs uppercase tracking-[0.2em] text-[--mat-sys-on-surface-variant]">
          Preferences
        </p>
        <p class="mt-1 text-base font-semibold">Configuration loaded</p>
      </div>
      <p class="text-sm text-[--mat-sys-on-surface-variant]">
        The page now resolves configuration data before rendering.
      </p>
      <pre
        class="overflow-x-auto rounded-2xl bg-slate-950 p-4 text-xs leading-6 text-slate-100"
      >{{ settings() | json }}</pre>
    </mat-card-content>
  </mat-card>
</div>
