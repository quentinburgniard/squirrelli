<mat-stepper [linear]="isLinear" #stepper>
  <mat-step [stepControl]="firstFormGroup">
    <form [formGroup]="firstFormGroup">
      <ng-template matStepLabel>Select file</ng-template>
      <penny-expenses-select-import-file (parsed)="onFileParsed($event)" />
    </form>
  </mat-step>
  <mat-step [stepControl]="secondFormGroup" label="Map columns">
    <form [formGroup]="secondFormGroup">
      {{ columnNames | json }}
      <mat-form-field>
        <mat-label>Address</mat-label>
        <input
          matInput
          formControlName="secondCtrl"
          placeholder="Ex. 1 Main St, New York, NY"
          required
        />
      </mat-form-field>
      <div>
        <button matButton matStepperPrevious>Back</button>
        <button matButton matStepperNext>Next</button>
      </div>
    </form>
  </mat-step>
  <mat-step label="Review">
    <p class="text-sm text-slate-600">Review the parsed data before importing.</p>
    <div>
      <button matButton matStepperPrevious>Back</button>
      <button matButton (click)="stepper.reset()">Reset</button>
    </div>
  </mat-step>
</mat-stepper>
